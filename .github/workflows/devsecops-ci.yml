# ============================================================
#  DevSecOps CI Pipeline - OPC Server Project
#  Aşama 8: Security Gates & Coverage Optimization
# ============================================================

name: DevSecOps CI

on:
  push:
    branches: [main, develop, 'feature/**', 'security/**', 'hotfix/**']
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — GATE #1 : SECRET SCANNING
  # ─────────────────────────────────────────────────────────────
  secret-scan:
    name: "🔒 Gate-1 · Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — GATE #2 : DEPENDENCY AUDIT
  # ─────────────────────────────────────────────────────────────
  dependency-check:
    name: "🔒 Gate-2 · Dependency Audit"
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore OpcServerSolution.sln
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'OpcServerSolution'
          path: '.'
          format: 'HTML'
          out: 'dependency-check-report'
          args: >
            --failOnCVSS 11
            --enableRetired
            --exclude "**/bin/**"
            --exclude "**/obj/**"

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — BUILD + TEST + GATE #3 : SAST (SONARCLOUD)
  # ─────────────────────────────────────────────────────────────
  build-test-sast:
    name: "⚙️ Build · Test · Gate-3 SAST"
    runs-on: windows-latest
    needs: dependency-check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      # ── SonarCloud Başlat (Kritik Dosya Dışlamaları Burada) ──
      - name: SonarCloud — Begin Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin `
            /k:"DiLaRaSnTrK_opc-server-project" `
            /o:"dilara-sntrk11" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" `
            /d:sonar.exclusions="**/UI/**,**/TestApp/**,**/OPC Server/**" `
            /d:sonar.coverage.exclusions="**/UI/**,**/TestApp/**,**/Infrastructure/OPC/OpcServerService.cs,**/Infrastructure/OPC/CustomNodeManager.cs,**/Infrastructure/OPC/DevSecOpsServer.cs,**/Infrastructure/OPC/ModbusOpcBridge.cs" `
            /d:sonar.qualitygate.wait=true

      - name: dotnet build
        run: dotnet build OpcServerSolution.sln --configuration Release

      - name: dotnet test + Coverage
        run: |
          dotnet test OpcServerSolution.sln `
            --no-build `
            --configuration Release `
            --collect:"XPlat Code Coverage;Format=opencover" `
            --results-directory TestResults/
        shell: powershell

      - name: SonarCloud — End Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — PIPELINE SUMMARY
  # ─────────────────────────────────────────────────────────────
  pipeline-summary:
    name: "📋 Pipeline Özet"
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-check, build-test-sast]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## DevSecOps Pipeline Sonucu" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Araç | Sonuç |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Gate-1 Secret Scan | Gitleaks | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Gate-2 Dep Audit | OWASP DC | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Gate-3 SAST | SonarCloud | ${{ needs.build-test-sast.result }} |" >> $GITHUB_STEP_SUMMARY